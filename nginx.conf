# Alternative nginx configuration (without Traefik).
# The default docker-compose.yaml uses Traefik for reverse proxy and SSL.
# Use this config if you prefer nginx instead -- pair it with your own
# docker-compose override that replaces the traefik service with nginx.

events {
    worker_connections 1024;
}

http {
    upstream api {
        server app:8000;
    }

    upstream web {
        server web:3000;
    }

    server {
        listen 80;
        server_name localhost;

        # Frontend - Vue app
        location / {
            proxy_pass http://web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # API routes
        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS headers
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

        # Health check
        location /health {
            proxy_pass http://api/health;
            proxy_set_header Host $host;
        }
    }
}
