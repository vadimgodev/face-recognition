name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install linting tools
        run: pip install 'ruff>=0.15,<0.16' 'black>=25.11,<26.0'

      - name: Run ruff
        run: ruff check src/ tests/

      - name: Check black formatting
        run: black --check src/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx numpy

      - name: Patch torch for Python 3.13 compatibility
        run: |
          SITE=$(python -c "import site; print(site.getsitepackages()[0])")
          sed -i 's/except OSError:/except (OSError, SyntaxError):/' "$SITE/torch/_jit_internal.py" 2>/dev/null || true

      - name: Run tests
        run: |
          python -m pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            -q

      - name: Upload coverage to Codecov
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
